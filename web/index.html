<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawDad</title>

  <!-- Default theme vars (dark) — applied before JS loads to prevent flash -->
  <style>
    :root {
      --bg: #0f1117; --bg2: #161922; --bg3: #1e2130; --bg-hover: #252940;
      --txt: #e1e4ed; --txt2: #8b8fa3; --txt-muted: #5e6275;
      --accent: #6c8aff; --accent-dim: #3d5199;
      --userbg: #1a2744; --asstbg: #1c1f2e; --border: #2a2d3e; --err: #ff6b6b;
    }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg:     { DEFAULT: 'var(--bg)', 2: 'var(--bg2)', 3: 'var(--bg3)', hover: 'var(--bg-hover)' },
            txt:    { DEFAULT: 'var(--txt)', 2: 'var(--txt2)', muted: 'var(--txt-muted)' },
            accent: { DEFAULT: 'var(--accent)', dim: 'var(--accent-dim)' },
            userbg: 'var(--userbg)',
            asstbg: 'var(--asstbg)',
            border: 'var(--border)',
            err:    'var(--err)',
          },
          fontFamily: {
            sans: ['-apple-system','BlinkMacSystemFont','Segoe UI','system-ui','sans-serif'],
            mono: ['SF Mono','Fira Code','Cascadia Code','monospace'],
          },
        }
      }
    }
  </script>

  <script type="importmap">
  {
    "imports": {
      "preact":         "https://esm.sh/preact@10.25.4",
      "preact/hooks":   "https://esm.sh/preact@10.25.4/hooks",
      "preact/signals": "https://esm.sh/@preact/signals@2.0.0?external=preact",
      "htm/preact":     "https://esm.sh/htm@3.1.1/preact?external=preact"
    }
  }
  </script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/styles/github-dark.min.css">
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.10.0/build/highlight.min.js"></script>

  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/blocks.css">
  <link rel="stylesheet" href="/css/pixel.css">
</head>
<body class="h-screen bg-bg text-txt overflow-hidden">
  <div id="app" class="h-full"></div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
